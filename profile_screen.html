<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EasyRoute - My Profile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f6df0",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101822",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-size: 24px; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<div class="relative mx-auto max-w-md min-h-screen flex flex-col bg-background-light dark:bg-background-dark pb-24">
<!-- Header -->
<div class="sticky top-0 z-10 flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-4 border-b border-slate-200 dark:border-slate-800 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-10 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight flex-1 ml-2">My Profile</h2>
<button class="bg-primary text-white px-4 py-2 rounded-lg text-sm font-bold tracking-wide hover:bg-primary/90 transition-colors">
                Save
            </button>
</div>
<!-- Profile Header -->
<div class="flex p-6">
<div class="flex w-full flex-col gap-4 items-center">
<div class="relative">
<div class="bg-slate-200 dark:bg-slate-800 bg-center bg-no-repeat aspect-square bg-cover rounded-full min-h-24 w-24 border-4 border-white dark:border-slate-700 shadow-sm" data-alt="Professional profile headshot of a smiling man" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBdI8UTpSlcqBAhRI2s_W3MRKEFDE27I42O5hXQPQpO2LljN3m_NcPMCcfyFD0mzUKwfA0VdQDFaMgJ-niRnejpOKRJyJenirExSNHLabtdk3LF4IgIpkPB7GYiDWyXdgGTj2ii0GIoyB5KbY8R412AaR7nzaz5GB01sp7qDdp_Vs9L5TWfL5PwdqRUsN7zwH5QvZsu3jVrdm5hHrheIHE_wFbXu_2IOvumxufzyFAOpJOOLv_2UA8ZWPKs-zh_aaOapc8iulm5LK3N");'>
</div>
<div class="absolute bottom-0 right-0 bg-primary text-white p-1.5 rounded-full border-2 border-white dark:border-slate-700">
<span class="material-symbols-outlined text-sm">photo_camera</span>
</div>
</div>
<div class="flex flex-col items-center">
<p class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight">Johnathan Doe</p>
<div class="flex items-center gap-1 mt-1">
<span class="material-symbols-outlined text-primary text-base">verified</span>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Verified Account</p>
</div>
</div>
</div>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-6 px-4">
<!-- Read-only Mobile -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Mobile Number
<div class="flex items-center bg-slate-100 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 h-14 cursor-not-allowed">
<span class="text-slate-500 dark:text-slate-400 font-medium">+1 (555) 012-3456</span>
<span class="material-symbols-outlined text-slate-400 ml-auto text-xl">lock</span>
</div>
</label></div>
<!-- Emergency Contact (Editable) -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Emergency Contact</label>
<div class="relative group">
<input class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:border-primary focus:ring-1 focus:ring-primary rounded-xl px-4 h-14 text-slate-900 dark:text-slate-100 transition-all outline-none" type="text" value="+1 (555) 999-8877"/>
<div class="absolute right-4 top-4 text-slate-400">
<span class="material-symbols-outlined">edit</span>
</div>
</div>
</div>
<!-- T-PIN Section -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">T-PIN (Transaction PIN)</label>
<div class="relative">
<input class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:border-primary focus:ring-1 focus:ring-primary rounded-xl px-4 h-14 text-slate-900 dark:text-slate-100 transition-all outline-none" type="password" value="1234"/>
<div class="absolute right-4 top-4 text-slate-400 flex gap-2">
<span class="material-symbols-outlined cursor-pointer hover:text-primary">visibility</span>
<span class="material-symbols-outlined cursor-pointer hover:text-primary">autorenew</span>
</div>
</div>
<p class="text-xs text-slate-500 dark:text-slate-400 ml-1">Used for route security and fast checkout.</p>
</div>
<!-- Locality/Landmark -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Locality / Landmark</label>
<input class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:border-primary focus:ring-1 focus:ring-primary rounded-xl px-4 h-14 text-slate-900 dark:text-slate-100 outline-none" placeholder="e.g. Near Central Park Tower" type="text"/>
</div>
<!-- Home Address -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Home Address</label>
<textarea class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:border-primary focus:ring-1 focus:ring-primary rounded-xl p-4 text-slate-900 dark:text-slate-100 outline-none resize-none" rows="3">123 Maple Street, Apt 4B, Silicon Valley, CA 94025</textarea>
</div>
<!-- Map Section -->
<div class="flex flex-col gap-3 mt-2">
<div class="flex items-center justify-between">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Pinned Location</label>
<button class="flex items-center gap-1 text-primary text-sm font-bold hover:underline">
<span class="material-symbols-outlined text-lg">my_location</span>
                        Use GPS Location
                    </button>
</div>
<div class="relative w-full aspect-video rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700 group">
<div class="w-full h-full bg-slate-200 dark:bg-slate-800 bg-center bg-cover" data-alt="Modern map interface with a blue pin in a residential area" data-location="San Francisco" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuD0i7h5CAJaE_tgpOur1SgbrGrQGBfac01Xp_o28amNblTh_3d_DLPg318vQmWalll8K-Ri6TC0m4xcYAr6BLqzDodTVC4pSnb1_QfWsZobY3BZgJhUf91trdVOOGS_zR5qk2Yezzum-T2bnuZv4mI64QWCvDjHEl6iyPhTYj3c2XjdVzshrNWTkRgtyDqwkrEq-E9nu2gyJv1NJao5gLaZR43TkfM4qUioZClI0M_S_YTS9_wcjdD6wVKPbecXXi8-Am6QtqU4ZW0h");'>
</div>
<!-- Map Pin Overlay -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="relative flex flex-col items-center">
<span class="material-symbols-outlined text-primary text-5xl drop-shadow-lg fill-current">location_on</span>
<div class="bg-white dark:bg-slate-800 px-3 py-1 rounded-full text-[10px] font-bold shadow-xl border border-slate-100 dark:border-slate-700 mb-10 absolute -top-8">
                                Home
                            </div>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Save Button (Redundant but convenient) -->
<div class="p-4 mt-8">
<button class="w-full bg-primary text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                Save Changes
            </button>
</div>
<!-- Bottom Navigation Bar -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md flex gap-2 border-t border-slate-200 dark:border-slate-800 bg-white/90 dark:bg-slate-900/90 backdrop-blur-lg px-4 pb-6 pt-3 z-50">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-medium leading-normal tracking-tight">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">route</span>
<p class="text-[10px] font-medium leading-normal tracking-tight">Routes</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">history</span>
<p class="text-[10px] font-medium leading-normal tracking-tight">History</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-current">person</span>
<p class="text-[10px] font-bold leading-normal tracking-tight">Profile</p>
</a>
</div>
</div>
</body></html>
