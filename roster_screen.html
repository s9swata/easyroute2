<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Roster - EasyRoute</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f6df0",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101822",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden max-w-2xl mx-auto shadow-sm">
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-slate-200 dark:border-slate-800 sticky top-0 z-10">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 ml-4">Create Roster</h2>
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center">
<span class="material-symbols-outlined">more_vert</span>
</div>
</div>
<div class="flex flex-col gap-6 p-4">
<section>
<h3 class="text-slate-900 dark:text-slate-100 text-base font-bold leading-tight tracking-tight pb-3">Trip Direction</h3>
<div class="flex">
<div class="flex h-12 flex-1 items-center justify-center rounded-xl bg-slate-200 dark:bg-slate-800 p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-600 dark:text-slate-400 text-sm font-semibold transition-all">
<span class="truncate text-sm">Login</span>
<input class="invisible w-0" name="direction" type="radio" value="Login"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-600 dark:text-slate-400 text-sm font-semibold transition-all">
<span class="truncate text-sm">Logout</span>
<input class="invisible w-0" name="direction" type="radio" value="Logout"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-600 dark:text-slate-400 text-sm font-semibold transition-all">
<span class="truncate text-sm">Both</span>
<input checked="" class="invisible w-0" name="direction" type="radio" value="Both"/>
</label>
</div>
</div>
</section>
<section>
<div class="flex flex-col gap-2">
<p class="text-slate-900 dark:text-slate-100 text-sm font-bold leading-normal">Office Location</p>
<div class="flex w-full items-stretch rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800 bg-slate-100 dark:bg-slate-900/50">
<input class="flex w-full min-w-0 flex-1 border-none bg-transparent h-12 px-4 text-slate-500 dark:text-slate-400 text-sm font-normal focus:ring-0 cursor-not-allowed" readonly="" value="Innovation Tech Park, Tower B, Sector 62"/>
<div class="flex items-center px-4 text-slate-400">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
</div>
<p class="text-xs text-slate-500 italic">Office location is fixed based on your profile.</p>
</div>
</section>
<section>
<h3 class="text-slate-900 dark:text-slate-100 text-base font-bold leading-tight tracking-tight pb-3">Weekly Offs</h3>
<div class="grid grid-cols-4 sm:grid-cols-7 gap-2">
<label class="flex flex-col items-center gap-2 cursor-pointer group">
<input class="hidden peer" type="checkbox"/>
<span class="w-10 h-10 flex items-center justify-center rounded-full border-2 border-slate-200 dark:border-slate-800 peer-checked:bg-primary peer-checked:border-primary peer-checked:text-white text-slate-600 dark:text-slate-400 font-medium text-xs transition-all">M</span>
</label>
<label class="flex flex-col items-center gap-2 cursor-pointer group">
<input class="hidden peer" type="checkbox"/>
<span class="w-10 h-10 flex items-center justify-center rounded-full border-2 border-slate-200 dark:border-slate-800 peer-checked:bg-primary peer-checked:border-primary peer-checked:text-white text-slate-600 dark:text-slate-400 font-medium text-xs transition-all">T</span>
</label>
<label class="flex flex-col items-center gap-2 cursor-pointer group">
<input class="hidden peer" type="checkbox"/>
<span class="w-10 h-10 flex items-center justify-center rounded-full border-2 border-slate-200 dark:border-slate-800 peer-checked:bg-primary peer-checked:border-primary peer-checked:text-white text-slate-600 dark:text-slate-400 font-medium text-xs transition-all">W</span>
</label>
<label class="flex flex-col items-center gap-2 cursor-pointer group">
<input class="hidden peer" type="checkbox"/>
<span class="w-10 h-10 flex items-center justify-center rounded-full border-2 border-slate-200 dark:border-slate-800 peer-checked:bg-primary peer-checked:border-primary peer-checked:text-white text-slate-600 dark:text-slate-400 font-medium text-xs transition-all">T</span>
</label>
<label class="flex flex-col items-center gap-2 cursor-pointer group">
<input class="hidden peer" type="checkbox"/>
<span class="w-10 h-10 flex items-center justify-center rounded-full border-2 border-slate-200 dark:border-slate-800 peer-checked:bg-primary peer-checked:border-primary peer-checked:text-white text-slate-600 dark:text-slate-400 font-medium text-xs transition-all">F</span>
</label>
<label class="flex flex-col items-center gap-2 cursor-pointer group">
<input checked="" class="hidden peer" type="checkbox"/>
<span class="w-10 h-10 flex items-center justify-center rounded-full border-2 border-slate-200 dark:border-slate-800 peer-checked:bg-primary peer-checked:border-primary peer-checked:text-white text-slate-600 dark:text-slate-400 font-medium text-xs transition-all">S</span>
</label>
<label class="flex flex-col items-center gap-2 cursor-pointer group">
<input checked="" class="hidden peer" type="checkbox"/>
<span class="w-10 h-10 flex items-center justify-center rounded-full border-2 border-slate-200 dark:border-slate-800 peer-checked:bg-primary peer-checked:border-primary peer-checked:text-white text-slate-600 dark:text-slate-400 font-medium text-xs transition-all">S</span>
</label>
</div>
</section>
<section class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<p class="text-slate-900 dark:text-slate-100 text-sm font-bold leading-normal">Start Date</p>
<div class="relative">
<input class="w-full h-12 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-sm focus:ring-primary focus:border-primary dark:text-slate-100 px-4" type="date"/>
</div>
</div>
<div class="flex flex-col gap-2">
<p class="text-slate-900 dark:text-slate-100 text-sm font-bold leading-normal">End Date</p>
<div class="relative">
<input class="w-full h-12 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-sm focus:ring-primary focus:border-primary dark:text-slate-100 px-4" type="date"/>
</div>
</div>
</section>
<section class="grid grid-cols-2 gap-4 p-4 rounded-2xl bg-primary/5 border border-primary/10">
<div class="flex flex-col gap-2">
<p class="text-slate-900 dark:text-slate-100 text-sm font-bold leading-normal">Login Time</p>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-primary text-xl">schedule</span>
<input class="w-full h-12 pl-10 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-sm focus:ring-primary focus:border-primary dark:text-slate-100" type="time" value="09:00"/>
</div>
</div>
<div class="flex flex-col gap-2">
<p class="text-slate-900 dark:text-slate-100 text-sm font-bold leading-normal">Logout Time</p>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-primary text-xl">logout</span>
<input class="w-full h-12 pl-10 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-sm focus:ring-primary focus:border-primary dark:text-slate-100" type="time" value="18:00"/>
</div>
</div>
</section>
<section class="flex flex-col gap-4">
<div class="flex flex-col gap-2">
<p class="text-slate-900 dark:text-slate-100 text-sm font-bold leading-normal">Pickup Location</p>
<div class="relative">
<select class="w-full h-12 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-sm focus:ring-primary focus:border-primary dark:text-slate-100 px-4 appearance-none">
<option>Home - Residency Road, Apt 402</option>
<option>Main Gate - Community Center</option>
<option>Metro Station - Exit 1</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<div class="flex flex-col gap-2">
<p class="text-slate-900 dark:text-slate-100 text-sm font-bold leading-normal">Drop Location</p>
<div class="relative">
<select class="w-full h-12 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-sm focus:ring-primary focus:border-primary dark:text-slate-100 px-4 appearance-none">
<option>Home - Residency Road, Apt 402</option>
<option>Main Gate - Community Center</option>
<option>Metro Station - Exit 1</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
</section>
</div>
<div class="mt-auto p-4 bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 pb-8">
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">save</span>
                Save Roster
            </button>
</div>
</div>
</body></html>
