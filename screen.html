<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EasyRoute Home</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f6df0",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101822",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display">
<!-- Header -->
<header class="flex items-center justify-between p-4 sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10">
<div class="flex items-center gap-3">
<div class="size-10 rounded-full bg-primary flex items-center justify-center text-white">
<span class="material-symbols-outlined">route</span>
</div>
<h2 class="text-xl font-bold tracking-tight">EasyRoute</h2>
</div>
<div class="flex items-center gap-2">
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">history</span>
</button>
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
<div class="size-10 rounded-full border-2 border-primary/20 overflow-hidden ml-1">
<img alt="User Profile" data-alt="Corporate employee professional headshot profile picture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC2JLTynzIK6Q2CUFcwAuHw1GCu0DT_5-7XmEb1AF7ZM_EGZY7ivsO6-tagx9kJJfg003CTPKrtMeU5SRrDBhIEiv-tW2Ybsw3zgwSIbAaJXJ_KITEyY_GS1VoJsjt2cVX7BTLGODlNyfOTc1I4n8Dy59jNhWQ0JceHCDs46OUVlMKk6ir1XrcyyMimSJGb9NFEW0-oJ2nLooZ2GTWWR2gSCKu2dWEdBuCqbGdPyaEXvcx2H9bd9LvKXaWSMNDH4MT0qBbl5YmNjV0K"/>
</div>
</div>
</header>
<main class="flex-1 flex flex-col max-w-3xl mx-auto w-full px-4 pt-12 pb-32">
<!-- Welcome Section -->
<div class="mb-12">
<h1 class="text-5xl font-semibold tracking-tight mb-4">
<span class="bg-gradient-to-r from-primary to-blue-400 bg-clip-text text-transparent">Hello, Alex</span>
</h1>
<p class="text-xl text-slate-500 dark:text-slate-400">Ready to optimize your corporate travel today?</p>
</div>
<!-- Quick Action Tiles -->
<div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-12">
<button class="flex flex-col items-start p-5 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 hover:border-primary transition-all group shadow-sm">
<div class="size-10 rounded-xl bg-primary/10 text-primary flex items-center justify-center mb-4 group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined">edit_calendar</span>
</div>
<span class="font-semibold text-lg">Create Roster</span>
<p class="text-sm text-slate-500 text-left">Generate new employee schedules</p>
</button>
<button class="flex flex-col items-start p-5 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 hover:border-primary transition-all group shadow-sm">
<div class="size-10 rounded-xl bg-primary/10 text-primary flex items-center justify-center mb-4 group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined">monitoring</span>
</div>
<span class="font-semibold text-lg">View Stats</span>
<p class="text-sm text-slate-500 text-left">Analyze travel costs and efficiency</p>
</button>
<button class="flex flex-col items-start p-5 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 hover:border-primary transition-all group shadow-sm">
<div class="size-10 rounded-xl bg-primary/10 text-primary flex items-center justify-center mb-4 group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined">explore</span>
</div>
<span class="font-semibold text-lg">Explore Trips</span>
<p class="text-sm text-slate-500 text-left">Discover best routes and stays</p>
</button>
</div>
<!-- Central AI Agent Textbox (Gemini Style) -->
<div class="mt-auto w-full sticky bottom-24 bg-background-light dark:bg-background-dark py-4">
<div class="relative group">
<div class="absolute -inset-0.5 bg-gradient-to-r from-primary to-blue-400 rounded-2xl blur opacity-20 group-focus-within:opacity-40 transition duration-1000"></div>
<div class="relative flex flex-col w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-2 shadow-xl">
<textarea class="w-full bg-transparent border-none focus:ring-0 text-lg p-3 resize-none min-h-[100px] placeholder:text-slate-400" placeholder="How can I help you today?"></textarea>
<div class="flex items-center justify-between px-2 pb-2">
<div class="flex gap-1">
<button class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg">
<span class="material-symbols-outlined">image</span>
</button>
<button class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg">
<span class="material-symbols-outlined">mic</span>
</button>
</div>
<button class="bg-primary text-white p-2 rounded-xl flex items-center justify-center hover:bg-blue-600 transition-colors">
<span class="material-symbols-outlined">send</span>
</button>
</div>
</div>
</div>
<p class="text-center text-xs text-slate-400 mt-4 px-8">EasyRoute AI may provide inaccurate travel information. Check important flight and hotel details.</p>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 px-6 py-2 flex justify-between items-center z-20">
<a class="flex flex-col items-center gap-1 py-1 px-4 text-primary" href="#">
<span class="material-symbols-outlined fill-1">home</span>
<span class="text-[10px] font-medium">Home</span>
</a>
<a class="flex flex-col items-center gap-1 py-1 px-4 text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">list_alt</span>
<span class="text-[10px] font-medium">Rosters</span>
</a>
<a class="flex flex-col items-center gap-1 py-1 px-4 text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">leaderboard</span>
<span class="text-[10px] font-medium">Analytics</span>
</a>
<a class="flex flex-col items-center gap-1 py-1 px-4 text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">Profile</span>
</a>
</nav>
</body></html>
